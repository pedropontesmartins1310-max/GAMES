<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shooter Game</title>
    <style>
        :root {
            --bg: #2f1d0f;
            --sand: #c79445;
            --sky: #4b7a98;
            --sun: #f4c95d;
            --wood: #6b3f20;
            --cactus: #2e7d32;
            --accent: #b32d2d;
            --panel: #3d2413;
            --text: #fff1c8;
            --border: #2b160a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(180deg, #5a8ba8 0%, #2c1b0d 100%);
            font-family: "Courier New", Courier, monospace;
            color: var(--text);
            gap: 16px;
            padding: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        #controls {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.55);
            padding: 10px 14px;
            color: var(--text);
            font-size: 13px;
            border: 4px solid var(--border);
            box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.06);
        }

        #controls select {
            padding: 6px 10px;
            border: 3px solid var(--border);
            outline: none;
            background: #f5e5b6;
            color: #2f1d0f;
            font-family: inherit;
            font-size: 13px;
            font-weight: bold;
        }
        
        #gameContainer {
            position: relative;
            width: 800px;
            height: 600px;
            background: linear-gradient(180deg, var(--sky) 0%, #2e5570 45%, var(--sand) 45%, #9f6f2f 100%);
            border: 6px solid var(--border);
            box-shadow: 0 0 0 6px rgba(0, 0, 0, 0.35), inset 0 0 0 3px rgba(255, 255, 255, 0.08);
            cursor: crosshair;
            overflow: hidden;
            image-rendering: pixelated;
        }

        #gameContainer::before {
            content: '';
            position: absolute;
            top: 24px;
            right: 32px;
            width: 110px;
            height: 110px;
            background: radial-gradient(circle, var(--sun) 0%, #d8a43a 70%, transparent 71%);
            border-radius: 50%;
            box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.12);
        }

        #gameContainer::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 110px;
            background: linear-gradient(180deg, transparent 0%, rgba(0, 0, 0, 0.2) 100%);
            border-top: 6px solid rgba(70, 40, 18, 0.6);
        }

        .decor {
            position: absolute;
            image-rendering: pixelated;
            pointer-events: none;
        }

        .sunray {
            position: absolute;
            top: 48px;
            right: 54px;
            width: 12px;
            height: 80px;
            background: rgba(255, 255, 255, 0.35);
            transform-origin: bottom center;
        }

        .sunray:nth-child(2) { transform: rotate(45deg); }
        .sunray:nth-child(3) { transform: rotate(90deg); }
        .sunray:nth-child(4) { transform: rotate(135deg); }

        .cactus {
            bottom: 22px;
            width: 34px;
            height: 90px;
            background: linear-gradient(180deg, var(--cactus) 0%, #1d5922 100%);
            border: 3px solid #133b17;
            box-shadow: inset 0 0 0 3px rgba(255,255,255,0.08);
        }

        .cactus::before,
        .cactus::after {
            content: '';
            position: absolute;
            background: inherit;
            border: inherit;
        }

        .cactus::before {
            left: -14px;
            top: 12px;
            width: 22px;
            height: 44px;
        }

        .cactus::after {
            right: -14px;
            top: 24px;
            width: 18px;
            height: 34px;
        }

        .cactus-left { left: 70px; }
        .cactus-right { right: 80px; transform: scale(1.08); }

        .saloon {
            position: absolute;
            bottom: 20px;
            right: 180px;
            width: 110px;
            height: 72px;
            background: linear-gradient(180deg, #7b4b28 0%, #5a331d 100%);
            border: 4px solid var(--border);
            box-shadow: inset 0 0 0 3px rgba(255,255,255,0.08);
        }

        .saloon::before {
            content: '';
            position: absolute;
            left: 12px;
            top: 12px;
            width: 26px;
            height: 26px;
            background: #f0c96a;
            border: 3px solid var(--border);
        }

        .saloon::after {
            content: '';
            position: absolute;
            right: 12px;
            top: 12px;
            width: 26px;
            height: 26px;
            background: #f0c96a;
            border: 3px solid var(--border);
        }

        .rocks {
            position: absolute;
            bottom: 16px;
            left: 40%;
            width: 70px;
            height: 36px;
            background: linear-gradient(180deg, #6f5c46 0%, #3f342b 100%);
            border-radius: 10px;
            border: 3px solid var(--border);
        }
        
        #score, #misses {
            position: absolute;
            top: 12px;
            padding: 8px 10px;
            color: var(--text);
            font-size: 14px;
            font-weight: bold;
            z-index: 100;
            background: rgba(0, 0, 0, 0.6);
            border: 3px solid var(--border);
            box-shadow: 0 0 0 2px rgba(255,255,255,0.08);
        }
        
        #score {
            left: 12px;
        }
        
        #misses {
            right: 12px;
        }
        
        .target {
            position: absolute;
            width: 52px;
            height: 52px;
            background: radial-gradient(circle at 30% 30%, #fff4cb 0%, #d8aa3a 30%, var(--accent) 55%, #4a1515 100%);
            border: 4px solid var(--border);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 0 3px rgba(0,0,0,0.25);
            transition: transform 0.1s;
            z-index: 50;
            image-rendering: pixelated;
        }
        
        .target:hover {
            transform: scale(1.08);
            box-shadow: 0 0 0 4px rgba(255,255,255,0.2);
        }
        
        .target::before {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: #fff;
            border: 2px solid var(--border);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        
        .target::after {
            content: '';
            position: absolute;
            width: 8px;
            height: 8px;
            background: #000;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
        }
        
        #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.82);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 200;
            padding: 20px;
        }
        
        #gameOverScreen.show {
            display: flex;
        }
        
        #gameOverText {
            color: #ffe082;
            font-size: 42px;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 3px 3px 0 #4a1f0d;
        }
        
        #finalScore {
            color: #8fe66d;
            font-size: 24px;
            margin-bottom: 24px;
        }
        
        #restartBtn {
            padding: 12px 28px;
            font-size: 18px;
            background: #7a3e1f;
            color: var(--text);
            border: 4px solid var(--border);
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
            font-family: inherit;
        }
        
        #restartBtn:hover {
            background: #935124;
        }

        .credit {
            position: fixed;
            left: 12px;
            bottom: 12px;
            font-size: 11px;
            color: rgba(255, 241, 200, 0.75);
            text-transform: none;
            letter-spacing: 0.5px;
            z-index: 300;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="controls">
        <label for="targetMode">Targets:</label>
        <select id="targetMode">
            <option value="few">Few</option>
            <option value="normal" selected>Normal</option>
            <option value="many">Many</option>
        </select>
    </div>

    <div id="gameContainer">
        <div class="decor sunray"></div>
        <div class="decor sunray"></div>
        <div class="decor sunray"></div>
        <div class="decor sunray"></div>
        <div class="decor cactus cactus-left"></div>
        <div class="decor cactus cactus-right"></div>
        <div class="decor saloon"></div>
        <div class="decor rocks"></div>
        <div id="score">Score: 0</div>
        <div id="misses">Misses: 0/5</div>
        <div id="gameOverScreen">
            <div id="gameOverText">GAME OVER</div>
            <div id="finalScore">Final Score: 0</div>
            <button id="restartBtn">Play Again</button>
        </div>
    </div>

    <div class="credit">Made by Pedro PM with the help of Copilot</div>

    <script>
        const gameContainer = document.getElementById('gameContainer');
        const scoreDisplay = document.getElementById('score');
        const missesDisplay = document.getElementById('misses');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const gameOverText = document.getElementById('gameOverText');
        const finalScoreDisplay = document.getElementById('finalScore');
        const restartBtn = document.getElementById('restartBtn');
        const targetModeSelect = document.getElementById('targetMode');

        let score = 0;
        let misses = 0;
        let maxMisses = 5;
        let gameOver = false;
        let spawnTimer;
        let targetTimeouts = [];
        let activeTargets = 0;
        let spawnRate = 1500;
        let maxActiveTargets = 2;

        function updateTargetSettings() {
            const mode = targetModeSelect.value;
            switch (mode) {
                case 'few':
                    spawnRate = 2200;
                    maxActiveTargets = 1;
                    break;
                case 'many':
                    spawnRate = 900;
                    maxActiveTargets = 4;
                    break;
                default:
                    spawnRate = 1500;
                    maxActiveTargets = 2;
                    break;
            }
        }

        function clearAllTargetTimeouts() {
            targetTimeouts.forEach(timeoutId => clearTimeout(timeoutId));
            targetTimeouts = [];
        }

        function scheduleNextSpawn() {
            clearTimeout(spawnTimer);
            if (gameOver) return;

            spawnTimer = setTimeout(() => {
                if (!gameOver && activeTargets < maxActiveTargets) {
                    spawnTarget();
                }
                scheduleNextSpawn();
            }, spawnRate);
        }

        function handleBackgroundClick(e) {
            if (gameOver) return;
            if (e.target === gameContainer || e.target.classList.contains('decor')) {
                misses++;
                missesDisplay.textContent = `Misses: ${misses}/${maxMisses}`;

                if (misses >= maxMisses) {
                    endGame();
                }
            }
        }

        function spawnTarget() {
            if (gameOver || activeTargets >= maxActiveTargets) return;

            activeTargets++;
            const target = document.createElement('div');
            target.className = 'target';
            
            const randomX = Math.random() * (gameContainer.clientWidth - 50);
            const randomY = Math.random() * (gameContainer.clientHeight - 50);
            
            target.style.left = randomX + 'px';
            target.style.top = randomY + 'px';
            
            gameContainer.appendChild(target);

            let targetHit = false;

            target.addEventListener('click', (e) => {
                e.stopPropagation();
                if (!targetHit) {
                    targetHit = true;
                    score++;
                    scoreDisplay.textContent = `Score: ${score}`;
                    activeTargets--;
                    target.remove();
                    clearTimeout(timeoutId);
                    targetTimeouts = targetTimeouts.filter(id => id !== timeoutId);
                    
                    if (score % 5 === 0) {
                        spawnRate = Math.max(800, spawnRate - 100);
                    }

                    if (!gameOver) {
                        scheduleNextSpawn();
                    }
                }
            });

            const timeoutId = setTimeout(() => {
                if (!targetHit && target.parentElement) {
                    activeTargets--;
                    misses++;
                    missesDisplay.textContent = `Misses: ${misses}/${maxMisses}`;
                    target.remove();
                    targetTimeouts = targetTimeouts.filter(id => id !== timeoutId);
                    
                    if (misses >= maxMisses) {
                        endGame();
                    } else if (!gameOver) {
                        scheduleNextSpawn();
                    }
                }
            }, 1000);

            targetTimeouts.push(timeoutId);
        }

        function endGame() {
            gameOver = true;
            clearTimeout(spawnTimer);
            clearAllTargetTimeouts();
            gameOverScreen.classList.add('show');
            gameOverText.textContent = 'GAME OVER';
            finalScoreDisplay.textContent = `Final Score: ${score}`;
            
            const targets = document.querySelectorAll('.target');
            targets.forEach(target => target.remove());
            activeTargets = 0;
        }

        function resetGame() {
            score = 0;
            misses = 0;
            gameOver = false;
            activeTargets = 0;
            updateTargetSettings();
            scoreDisplay.textContent = `Score: 0`;
            missesDisplay.textContent = `Misses: 0/${maxMisses}`;
            gameOverScreen.classList.remove('show');
            
            const targets = document.querySelectorAll('.target');
            targets.forEach(target => target.remove());
            
            clearTimeout(spawnTimer);
            clearAllTargetTimeouts();
            scheduleNextSpawn();
        }

        targetModeSelect.addEventListener('change', () => {
            updateTargetSettings();
            if (!gameOver) {
                const targets = document.querySelectorAll('.target');
                targets.forEach(target => target.remove());
                activeTargets = 0;
                clearTimeout(spawnTimer);
                clearAllTargetTimeouts();
                scheduleNextSpawn();
            }
        });

        gameContainer.addEventListener('click', handleBackgroundClick);
        restartBtn.addEventListener('click', resetGame);
        updateTargetSettings();
        scheduleNextSpawn();
    </script>
</body>
</html>
